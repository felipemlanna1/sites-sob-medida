<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparar Sites | Selecionar Melhor Versao</title>
<style>
:root{--bg:#09090b;--bg2:#111114;--bg3:#18181b;--bg4:#1f1f23;--border:#27272a;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--orange:#f59e0b;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

.top{position:sticky;top:0;z-index:100;background:rgba(9,9,11,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem}
.top-inner{max-width:1600px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem}
.top h1{font-size:1.1rem;font-weight:800;letter-spacing:-.03em}
.top h1 span{color:var(--accent2)}
.stats{display:flex;gap:1rem}
.st{text-align:center}.st-n{font-size:1.2rem;font-weight:800;color:var(--accent2)}.st-l{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}

.bar{max-width:1600px;margin:.75rem auto;padding:0 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.bar input{flex:1;min-width:160px;padding:.5rem .75rem;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:.8rem;outline:none}
.bar input:focus{border-color:var(--accent)}
.fbtn{padding:.4rem .7rem;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:.7rem;cursor:pointer;font-weight:600;transition:all .15s}
.fbtn:hover,.fbtn.on{border-color:var(--accent);color:var(--accent2);background:rgba(99,102,241,.08)}
.save-btn{padding:.4rem 1rem;border-radius:6px;border:none;background:var(--green);color:#000;font-size:.7rem;cursor:pointer;font-weight:700;transition:all .15s}
.save-btn:hover{background:#16a34a}

.wrap{max-width:1600px;margin:0 auto;padding:0 1.5rem 3rem}

.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:1rem;overflow:hidden;transition:border-color .2s}
.lead-card:hover{border-color:rgba(99,102,241,.2)}
.lead-card.selected{border-color:var(--green);box-shadow:0 0 20px rgba(34,197,94,.08)}

.lead-head{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;cursor:pointer;user-select:none}
.lead-info{display:flex;align-items:center;gap:.75rem}
.lead-id{font-weight:700;color:var(--text3);font-size:.75rem;min-width:35px}
.lead-name{font-weight:700;font-size:.9rem}
.lead-niche{font-size:.55rem;padding:.1rem .35rem;border-radius:3px;background:rgba(99,102,241,.1);color:var(--accent2);font-weight:600;text-transform:uppercase}
.lead-score{font-weight:800;font-size:.85rem}
.sc-h{color:var(--green)}.sc-m{color:var(--orange)}.sc-l{color:var(--text3)}
.lead-meta{display:flex;align-items:center;gap:.5rem}
.ver-count{font-size:.65rem;color:var(--text3);background:var(--bg3);padding:.15rem .4rem;border-radius:4px;font-weight:600}
.check-icon{font-size:1rem;color:var(--green);display:none}
.lead-card.selected .check-icon{display:inline}
.arrow{color:var(--text3);transition:transform .2s;font-size:.75rem}
.lead-card.open .arrow{transform:rotate(180deg)}

.lead-body{display:none;border-top:1px solid var(--border)}
.lead-card.open .lead-body{display:block}

.versions{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.75rem;padding:1rem}

.ver-card{background:var(--bg3);border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.ver-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-2px)}
.ver-card.chosen{border-color:var(--green);background:rgba(34,197,94,.03)}
.ver-card.chosen::after{content:'MELHOR';position:absolute;top:8px;right:8px;background:var(--green);color:#000;font-size:.55rem;font-weight:800;padding:.15rem .4rem;border-radius:4px;letter-spacing:.03em}

.ver-preview{width:100%;height:200px;background:var(--bg4);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.ver-preview iframe{width:200%;height:200%;transform:scale(.5);transform-origin:0 0;border:none;pointer-events:none}
.ver-preview .no-preview{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:.75rem}

.ver-info{padding:.6rem .75rem}
.ver-label{display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem}
.ver-type{font-size:.5rem;padding:.1rem .3rem;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
.t-original{background:rgba(239,68,68,.15);color:var(--red)}
.t-cf{background:rgba(34,197,94,.1);color:var(--green)}
.t-gh{background:rgba(245,158,11,.1);color:var(--orange)}
.t-numbered{background:rgba(99,102,241,.1);color:var(--accent2)}
.t-site-name{background:rgba(239,68,68,.1);color:var(--red)}
.ver-repo{font-size:.7rem;font-weight:600;color:var(--text2)}
.ver-link{font-size:.65rem;color:var(--text3);word-break:break-all}
.ver-link a{color:var(--accent2);text-decoration:none}
.ver-link a:hover{text-decoration:underline}
.ver-actions{display:flex;gap:.4rem;margin-top:.4rem}
.ver-btn{padding:.25rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--text2);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:.2rem}
.ver-btn:hover{border-color:var(--accent);color:var(--accent2)}
.ver-btn.sel{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}

.orphan-section{margin-top:2rem;border-top:1px solid var(--border);padding-top:1rem}
.orphan-title{font-size:.85rem;font-weight:700;color:var(--text3);margin-bottom:.75rem}
.orphan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.5rem}
.orphan-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.75rem}
.orphan-item a{color:var(--accent2);text-decoration:none}

@media(max-width:768px){.versions{grid-template-columns:1fr}.bar{padding:0 .75rem}.wrap{padding:0 .75rem 3rem}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

": 797, "name": "Oftalmocenter", "score": 85, "niche": "oftalmologista", "cf": "https://portfolio-sites-5vj.pages.dev/797-oftalmocenter/", "original": "https://oftalmocenter-sc.com.br", "versions": [], "totalVersions": 2}, {"id": 798, "name": "Instituto da Visão Assad Rayes", "score": 85, "niche": "oftalmologista", "cf": "https://portfolio-sites-5vj.pages.dev/798-assad-rayes/", "original": "https://institutoassadrayes.com.br", "versions": [], "totalVersions": 2}, {"id": 799, "name": "Catarinense Implantes", "score": 88, "niche": "odontologia", "cf": "https://portfolio-sites-5vj.pages.dev/799-catarinense-implantes/", "original": "https://catarinenseimplantes.com.br", "versions": [], "totalVersions": 2}], "orphans": [{"repo": "site-boteco-da-ilha", "url": "https://felipemlanna1.github.io/site-boteco-da-ilha/", "type": "orphan", "public": true}, {"repo": "site-briani-imoveis", "url": "https://felipemlanna1.github.io/site-briani-imoveis/", "type": "orphan", "public": true}, {"repo": "site-coei-odontologia", "url": "https://felipemlanna1.github.io/site-coei-odontologia/", "type": "orphan", "public": true}, {"repo": "site-ibelli", "url": "https://felipemlanna1.github.io/site-ibelli/", "type": "orphan", "public": true}, {"repo": "site-leonello-bocchese", "url": "https://felipemlanna1.github.io/site-leonello-bocchese/", "type": "orphan", "public": true}, {"repo": "site-mendes", "url": "https://felipemlanna1.github.io/site-mendes/", "type": "orphan", "public": true}, {"repo": "site-rafaela-salvato", "url": "https://felipemlanna1.github.io/site-rafaela-salvato/", "type": "orphan", "public": true}, {"repo": "site-vantaggio", "url": "https://felipemlanna1.github.io/site-vantaggio/", "type": "orphan", "public": true}]};
let selections=JSON.parse(localStorage.getItem('siteSelections')||'{}');

function sc(s){return !s?'sc-l':s>=85?'sc-h':s>=70?'sc-m':'sc-l'}

function buildCard(row){
  const card=document.createElement('div');
  card.className='lead-card'+(selections[row.id]?' selected':'');
  card.dataset.id=row.id;

  const hasCF=!!row.cf;
  const totalV=row.versions.length+(hasCF?1:0);

  card.innerHTML=`
  <div class="lead-head" onclick="toggle(${row.id})">
    <div class="lead-info">
      <span class="lead-id">#${row.id}</span>
      <span class="lead-name">${row.name}</span>
      ${row.niche?'<span class="lead-niche">'+row.niche+'</span>':''}
    </div>
    <div class="lead-meta">
      <span class="lead-score ${sc(row.score)}">${row.score||'-'}</span>
      <span class="ver-count">${totalV} versoes</span>
      <span class="check-icon">&#10003;</span>
      <span class="arrow">&#9660;</span>
    </div>
  </div>
  <div class="lead-body"><div class="versions" id="vers-${row.id}"></div></div>`;

  const grid=card.querySelector('.versions');

  // Original client website first (red)
  if(row.original){
    grid.appendChild(makeVer(row.id,'original',row.original,'Site Original do Cliente','t-original',true,row.original));
  }

  // CF version
  if(hasCF){
    grid.appendChild(makeVer(row.id,'cloudflare',row.cf,'Nosso Site (Cloudflare)','t-cf',true));
  }

  // GH versions - skip private numbered/site-num if lead has CF (same content)
  row.versions.forEach(v=>{
    if(!v.public && hasCF && (v.type==='numbered'||v.type==='site-num')) return;
    const tClass=v.type==='numbered'?'t-numbered':v.type==='site-num'?'t-gh':'t-site-name';
    const label=v.type==='numbered'?'Mais recente':v.type==='site-num'?'Intermediario':'Versao antiga';
    grid.appendChild(makeVer(row.id,v.repo,v.url,label+' ('+v.type+')',tClass,v.public,v.preview));
  });

  return card;
}

function makeVer(lid,key,url,label,tClass,isPublic,preview){
  const el=document.createElement('div');
  const chosen=selections[lid]===key;
  el.className='ver-card'+(chosen?' chosen':'');
  el.dataset.key=key;

  const previewUrl=preview||url;
  const previewHtml=previewUrl
    ?'<iframe src="'+previewUrl+'" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>'
    :'<div class="no-preview">Sem preview disponivel</div>';

  const openUrl=url||preview;
  const repoStatus=isPublic?'':'<span style="color:var(--orange);font-size:.6rem"> (repo privado, preview via CF)</span>';

  el.innerHTML=`
  <div class="ver-preview">${previewHtml}</div>
  <div class="ver-info">
    <div class="ver-label"><span class="ver-type ${tClass}">${label}</span></div>
    <div class="ver-repo">${key}${repoStatus}</div>
    ${openUrl?'<div class="ver-link"><a href="'+openUrl+'" target="_blank">Abrir em nova aba &#8599;</a></div>':''}
    <div class="ver-actions">
      <button class="ver-btn ${chosen?'sel':''}" onclick="event.stopPropagation();select(${lid},'${key}',this)">
        ${chosen?'&#10003; Selecionado':'Selecionar como melhor'}
      </button>
      ${openUrl?'<a class="ver-btn" href="'+openUrl+'" target="_blank" onclick="event.stopPropagation()">Abrir &#8599;</a>':''}
    </div>
  </div>`;
  return el;
}

function select(lid,key,btn){
  if(selections[lid]===key){delete selections[lid]}
  else{selections[lid]=key}
  localStorage.setItem('siteSelections',JSON.stringify(selections));
  render();
}

function toggle(lid){
  const card=document.querySelector(`.lead-card[data-id="${lid}"]`);
  card.classList.toggle('open');
}

function render(){
  const f=document.querySelector('.fbtn.on')?.dataset.f||'all';
  const q=document.getElementById('q').value.toLowerCase();
  const main=document.getElementById('main');
  main.innerHTML='';

  let leads=0,vers=0,cf=0,gh=0,sel=Object.keys(selections).length;

  D.rows.forEach(row=>{
    const hasCF=!!row.cf;
    const hasGH=row.versions.some(v=>v.public);
    const totalV=row.versions.length+(hasCF?1:0);

    leads++;vers+=totalV;
    if(hasCF)cf++;if(hasGH)gh++;

    if(f==='cf'&&!hasCF)return;
    if(f==='gh'&&!hasGH)return;
    if(f==='multi'&&totalV<3)return;
    if(f==='has-original'&&!row.original)return;
    if(f==='pending'&&selections[row.id])return;

    const s=`${row.id} ${row.name} ${row.niche} ${row.versions.map(v=>v.repo).join(' ')}`.toLowerCase();
    if(q&&!s.includes(q))return;

    main.appendChild(buildCard(row));
  });

  // Orphans
  if((f==='all'||f==='gh')&&D.orphans.length){
    const sec=document.createElement('div');
    sec.className='orphan-section';
    sec.innerHTML='<div class="orphan-title">Repos orfaos (sem lead mapeado) - '+D.orphans.length+'</div><div class="orphan-grid" id="og"></div>';
    const grid=sec.querySelector('#og');
    D.orphans.forEach(o=>{
      if(q&&!o.repo.toLowerCase().includes(q))return;
      const item=document.createElement('div');
      item.className='orphan-item';
      item.innerHTML=o.url?`<a href="${o.url}" target="_blank">${o.repo} &#8599;</a>`:`${o.repo} (privado)`;
      grid.appendChild(item);
    });
    main.appendChild(sec);
  }

  document.getElementById('sL').textContent=leads;
  document.getElementById('sV').textContent=vers;
  document.getElementById('sC').textContent=cf;
  document.getElementById('sG').textContent=gh;
  document.getElementById('sS').textContent=sel;
}

document.getElementById('q').addEventListener('input',()=>render());
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');render();
}));

document.getElementById('saveBtn').addEventListener('click',()=>{
  const lines=['Lead ID,Nome,Versao Selecionada'];
  D.rows.forEach(r=>{
    if(selections[r.id]){
      lines.push(r.id+','+r.name.replace(/,/g,' ')+','+selections[r.id]);
    }
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='selecoes-sites.csv';
  a.click();
});

render();
</script>
