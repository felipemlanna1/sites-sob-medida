function getScoreClass(s) {
  if (!s) return 'score-low';
  if (s >= 85) return 'score-high';
  if (s >= 70) return 'score-mid';
  return 'score-low';
}

function getStatus(row) {
  const hasCF = !!row.cf;
  const hasGH = row.gh.some(g => g.public);
  if (hasCF && hasGH) return 'both';
  if (hasCF) return 'cf-only';
  if (hasGH) return 'gh-only';
  return 'none';
}

function renderTable(filter, query) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let total=0, cfCount=0, ghCount=0, bothCount=0;

  DATA.rows.forEach((row, i) => {
    const status = getStatus(row);
    const hasCF = !!row.cf;
    const hasGH = row.gh.some(g => g.public);

    total++;
    if (hasCF) cfCount++;
    if (hasGH) ghCount++;
    if (hasCF && hasGH) bothCount++;

    if (filter !== 'all' && filter !== status) return;

    const searchStr = `${row.id} ${row.name} ${row.niche}`.toLowerCase();
    if (query && !searchStr.includes(query.toLowerCase())) return;

    const tr = document.createElement('tr');
    if (status === 'both') tr.classList.add('has-both');

    const badgeMap = {
      both: '<span class="badge-both">AMBOS</span>',
      'cf-only': '<span class="badge-cf">CF</span>',
      'gh-only': '<span class="badge-gh">GH</span>',
      none: '<span class="badge-none">NENHUM</span>'
    };

    const ghHtml = row.gh.length ? row.gh.map(g => {
      if (g.public && g.url) {
        return `<div class="link-gh"><a href="${g.url}" target="_blank">${g.repo}</a></div>`;
      } else {
        return `<div class="link-private">${g.repo} (privado)</div>`;
      }
    }).join('') : '<span class="link-private">-</span>';

    const cfHtml = row.cf
      ? `<div class="link-cf"><a href="${row.cf}" target="_blank">${row.cf.replace('https://portfolio-sites-5vj.pages.dev/','')}</a></div>`
      : '<span class="link-private">-</span>';

    let actionHtml = '';
    if (hasCF && hasGH) {
      const ghUrl = row.gh.find(g => g.public)?.url || '';
      actionHtml = `<a class="compare-btn" href="${row.cf}" target="_blank" title="Abrir CF">CF</a> <a class="compare-btn" href="${ghUrl}" target="_blank" title="Abrir GH">GH</a>`;
    }

    tr.innerHTML = `
      <td><span class="lead-id">${row.id}</span></td>
      <td><div class="lead-name">${row.name}</div>${row.niche ? '<div class="lead-niche">'+row.niche+'</div>' : ''}</td>
      <td><span class="lead-score ${getScoreClass(row.score)}">${row.score || '-'}</span></td>
      <td>${badgeMap[status]}</td>
      <td>${cfHtml}</td>
      <td><div class="gh-list">${ghHtml}</div></td>
      <td>${actionHtml}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCF').textContent = cfCount;
  document.getElementById('statGH').textContent = ghCount;
  document.getElementById('statBoth').textContent = bothCount;

  // Extras
  const extrasTitle = document.getElementById('extrasTitle');
  const extrasTable = document.getElementById('extrasTable');
  const extrasTbody = document.getElementById('extrasTbody');
  if (filter === 'all' || filter === 'gh-only') {
    extrasTitle.style.display = '';
    extrasTable.style.display = '';
    extrasTbody.innerHTML = '';
    DATA.extras.forEach((ex, i) => {
      if (query && !ex.repo.toLowerCase().includes(query.toLowerCase())) return;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><span class="lead-id">${i+1}</span></td><td>${ex.repo}</td><td class="link-gh"><a href="${ex.url}" target="_blank">${ex.url}</a></td>`;
      extrasTbody.appendChild(tr);
    });
  } else {
    extrasTitle.style.display = 'none';
    extrasTable.style.display = 'none';
  }
}

// Events
document.getElementById('search').addEventListener('input', e => {
  const active = document.querySelector('.filter-btn.active');
  renderTable(active?.dataset.filter || 'all', e.target.value);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(btn.dataset.filter, document.getElementById('search').value);
  });
});

renderTable('all', '');
</script>
